name: Deploy to Private EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add Private EC2 to Known Hosts
        run: |
          ssh-keyscan -H <PRIVATE_IP> >> ~/.ssh/known_hosts

      - name: Connect to Private EC2
        run: |
          ssh -o StrictHostKeyChecking=yes ec2-user@<PRIVATE_IP> << 'EOF'
            hostname
            pwd
            whoami
            ls -la
          EOF
